<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="React app with moving object animation" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>React Moving Object</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        overflow: hidden;
      }

      .moving-object {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb);
        border-radius: 50%;
        position: fixed;
        box-shadow: 
          0 0 20px rgba(255, 107, 107, 0.6),
          0 0 40px rgba(254, 202, 87, 0.4),
          0 0 60px rgba(72, 219, 251, 0.2);
        animation: moveAround 8s ease-in-out infinite;
      }

      .moving-object::after {
        content: '';
        position: absolute;
        top: 15%;
        left: 15%;
        width: 25%;
        height: 25%;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 50%;
      }

      @keyframes moveAround {
        0% {
          top: 10%;
          left: 10%;
          transform: scale(1) rotate(0deg);
        }
        25% {
          top: 10%;
          left: calc(100% - 90px);
          transform: scale(1.2) rotate(90deg);
        }
        50% {
          top: calc(100% - 90px);
          left: calc(100% - 90px);
          transform: scale(1) rotate(180deg);
        }
        75% {
          top: calc(100% - 90px);
          left: 10%;
          transform: scale(0.8) rotate(270deg);
        }
        100% {
          top: 10%;
          left: 10%;
          transform: scale(1) rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="moving-object"></div>
    <div id="root"></div>
  </body>
</html>
